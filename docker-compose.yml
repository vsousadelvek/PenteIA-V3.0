version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: penteia-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production-32chars!!}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:3000
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./penteia_lab.db:/app/penteia_lab.db
      - ./uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - penteia-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: penteia-worker
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production-32chars!!}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./penteia_lab.db:/app/penteia_lab.db
    depends_on:
      - redis
    networks:
      - penteia-net

  redis:
    image: redis:7-alpine
    container_name: penteia-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - penteia-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: penteia-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - penteia-net

volumes:
  redis-data:

networks:
  penteia-net:
    driver: bridge
