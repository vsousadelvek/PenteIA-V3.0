worker_processes 1;
worker_rlimit_nofile 512;

events {
    worker_connections 200;
    multi_accept off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=global:1m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=api:1m     rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=login:1m   rate=3r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:1m;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   15;
    keepalive_requests  200;
    client_body_timeout 8;
    client_header_timeout 8;
    send_timeout        10;
    reset_timedout_connection on;

    # Hide nginx version
    server_tokens off;

    # Rate limit status code
    limit_req_status 429;
    limit_conn_status 429;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/html text/css;

    # Logging off (simula prod com logs minimizados)
    access_log off;
    error_log  /dev/null crit;

    server {
        listen 80;
        server_name localhost;

        # Connection limit per IP
        limit_conn connlimit 20;

        # Security headers (site moderno)
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "SAMEORIGIN"                        always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Server                    "cloudflare" always;
        add_header X-Request-ID              $request_id always;

        # Root - site corporativo
        location / {
            limit_req zone=global burst=10 nodelay;
            root /usr/share/nginx/html;
            index index.html;
        }

        # Login endpoint — rate limitado agressivamente
        location /login {
            limit_req zone=login burst=2 nodelay;
            root /usr/share/nginx/html;
            try_files /login.html /index.html;
        }

        # API v1
        location /api/v1/ {
            limit_req zone=api burst=5 nodelay;
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;

            location /api/v1/status {
                return 200 '{"status":"ok","version":"1.0.0","env":"production","server":"nginx/1.25"}';
            }
            location /api/v1/health {
                return 200 '{"healthy":true,"db":"connected","cache":"connected"}';
            }
            location /api/v1/users {
                return 401 '{"error":"Unauthorized","message":"Token de autenticação necessário","code":401}';
            }
            location /api/v1/admin {
                return 403 '{"error":"Forbidden","message":"Acesso negado","code":403}';
            }
        }

        # API v2
        location /api/v2/ {
            limit_req zone=api burst=10 nodelay;
            add_header Content-Type "application/json; charset=utf-8" always;

            location /api/v2/metrics {
                return 200 '{"requests_total":94821,"errors_total":47,"avg_latency_ms":12,"uptime_s":864000}';
            }
            location /api/v2/config {
                return 401 '{"error":"Unauthorized","code":401}';
            }
        }

        # Bloqueia paths suspeitos (WAF simulado)
        location ~* \.(php|asp|aspx|jsp|cgi|sh|bash|env|git|svn)$ {
            return 403 '{"error":"Forbidden","waf":"blocked"}';
            add_header Content-Type "application/json" always;
        }

        location ~* (wp-admin|wp-login|phpmyadmin|adminer|\.git|\.env|xmlrpc) {
            return 403 '{"error":"Forbidden","waf":"blocked"}';
            add_header Content-Type "application/json" always;
        }

        # Rate limit exceeded response
        error_page 429 = @ratelimited;
        location @ratelimited {
            add_header Content-Type "application/json" always;
            add_header Retry-After "10" always;
            return 429 '{"error":"Too Many Requests","message":"Rate limit excedido. Tente novamente em 10 segundos.","code":429}';
        }

        error_page 404 = @notfound;
        location @notfound {
            add_header Content-Type "application/json" always;
            return 404 '{"error":"Not Found","code":404}';
        }
    }
}
