version: "3.9"

# Production compose — use: docker compose -f docker-compose.prod.yml up -d

x-common-env: &common-env
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  DATABASE_URL: sqlite:////data/penteia_lab.db
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-1440}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: penteia-api:latest
    container_name: penteia-api
    restart: unless-stopped
    # NOT exposed externally — only via nginx proxy
    expose:
      - "8000"
    environment:
      <<: *common-env
      CORS_ORIGINS: "http://localhost,https://${DOMAIN:-localhost}"
    volumes:
      - penteia-data:/data
      - uploads:/app/uploads
      - evidence:/app/evidence
    networks:
      - penteia-internal
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: penteia-frontend:latest
    container_name: penteia-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - penteia-internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/nginx
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  penteia-data:
    driver: local
  uploads:
    driver: local
  evidence:
    driver: local

networks:
  penteia-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.0.0/16
